name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            ocaml: 5.4.1
            platform: linux
            arch: amd64
          - os: macos-15-intel
            ocaml: 5.4.1
            platform: darwin
            arch: amd64
          - os: macos-14
            ocaml: 5.4.1
            platform: darwin
            arch: arm64
          - os: windows-2022
            ocaml: 5.4.1
            platform: windows
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml }}
      - name: Use GitHub mirrors for Erratique packages
        run: |
          opam pin add -yn astring "https://github.com/dbuenzli/astring.git#v0.8.5"
          opam pin add -yn bos "https://github.com/dbuenzli/bos.git#v0.2.1"
          opam pin add -yn cmdliner "https://github.com/dbuenzli/cmdliner.git#v2.1.0"
          opam pin add -yn fmt "https://github.com/dbuenzli/fmt.git#v0.11.0"
          opam pin add -yn fpath "https://github.com/dbuenzli/fpath.git#v0.7.3"
          opam pin add -yn mtime "https://github.com/dbuenzli/mtime.git#v2.1.0"
          opam pin add -yn rresult "https://github.com/dbuenzli/rresult.git#v0.7.0"
          opam pin add -yn topkg "https://github.com/dbuenzli/topkg.git#v1.1.1"
          opam pin add -yn uutf "https://github.com/dbuenzli/uutf.git#v1.0.4"
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune runtest
      - name: Package Unix release
        if: runner.os != 'Windows'
        run: opam exec -- ./scripts/package-release.sh dist "${{ matrix.platform }}" "${{ matrix.arch }}"
      - name: Package Windows release
        if: runner.os == 'Windows'
        run: |
          opam exec -- dune build '@install'
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/package-release.ps1 -OutputDir dist -Platform "${{ matrix.platform }}" -Arch "${{ matrix.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.sha256
          generate_release_notes: true
